  <body>
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Klik-Spel</title>
        <link rel="stylesheet" href="styles.css" />
      </head>
      <body>
        <h1>Klik-Spel</h1>

       <button id="startBtn">Start Spel</button>

        <div id="game">
          <h2>
Score: <span id="score">0</span>
&nbsp; | &nbsp;
Highscore: <span id="highscore">0</span>
</h2>
          <h2>Tijd: <span id="timer">60</span> seconden</h2>
          <p id="instruction">Klik zo vaak mogelijk op de rode bal!</p>
          <div id="target"></div>
        </div>

        <div id="result"></div>
        <div id="result"></div>

        <button id="restartBtn" style="display: none">Opnieuw Spelen</button>
        <script src="script.js"></script>
      </body>
    </html>
  </body>
